<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#cae6ff",
                    "on-primary-fixed": "#291800",
                    "on-secondary-fixed": "#390b00",
                    "tertiary-fixed-dim": "#8dcdff",
                    "inverse-on-surface": "#32302f",
                    "surface-container-lowest": "#0f0e0d",
                    "on-tertiary-container": "#004668",
                    "on-secondary": "#5d1800",
                    "tertiary-container": "#4ab7fc",
                    "outline": "#9e8e7a",
                    "surface-container-low": "#1d1b1a",
                    "surface-tint": "#ffb94c",
                    "on-background": "#e6e1df",
                    "secondary": "#ffb59d",
                    "surface-container-highest": "#363433",
                    "surface-container-high": "#2b2a28",
                    "secondary-fixed": "#ffdbd0",
                    "primary-fixed-dim": "#ffb94c",
                    "error-container": "#93000a",
                    "on-secondary-container": "#ffaf96",
                    "outline-variant": "#514534",
                    "background": "#141312",
                    "on-primary": "#442b00",
                    "primary": "#ffbe5b",
                    "tertiary": "#94d0ff",
                    "secondary-fixed-dim": "#ffb59d",
                    "surface-bright": "#3b3937",
                    "on-error": "#690005",
                    "inverse-primary": "#815500",
                    "on-tertiary": "#00344f",
                    "on-tertiary-fixed-variant": "#004b70",
                    "on-surface": "#e6e1df",
                    "primary-fixed": "#ffddb2",
                    "error": "#ffb4ab",
                    "surface-dim": "#141312",
                    "surface-container": "#211f1e",
                    "on-tertiary-fixed": "#001e30",
                    "inverse-surface": "#e6e1df",
                    "secondary-container": "#942b00",
                    "primary-container": "#e8a020",
                    "surface": "#141312",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#842500",
                    "on-surface-variant": "#d6c4ae",
                    "on-primary-container": "#5b3b00",
                    "surface-variant": "#363433",
                    "on-primary-fixed-variant": "#624000"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-shadow-amber {
            text-shadow: 0 0 12px rgba(232, 160, 32, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0F0E0D] dark:bg-[#0F0E0D] sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3 scale-95 duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined text-[#E8A020] text-2xl" data-icon="movie_filter">movie_filter</span>
<h1 class="text-2xl font-black text-[#E8A020] tracking-tighter font-headline">FILMDUEL</h1>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8">
<span class="text-[#E8A020] font-headline font-bold text-sm tracking-widest cursor-pointer">DUEL</span>
<span class="text-[#6B6760] hover:text-[#E8A020] font-headline font-bold text-sm tracking-widest transition-colors cursor-pointer">RANKINGS</span>
</div>
<span class="material-symbols-outlined text-[#E8A020] text-3xl cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center px-4 py-8 max-w-5xl mx-auto w-full relative">
<!-- Instruction Line -->
<div class="mb-12 text-center">
<p class="text-[#6B6760] font-label text-xs uppercase tracking-[0.2em] mb-2">ROUND 4 OF 10</p>
<h2 class="text-on-surface font-body text-lg font-medium opacity-80 italic">Tap the film you rate higher</h2>
</div>
<!-- Duel Arena -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-4 w-full relative items-center">
<!-- Competitor A -->
<div class="relative group cursor-pointer transition-all duration-300 transform hover:scale-[1.02] active:scale-95">
<!-- Floating Label -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 z-20">
<span class="bg-[#E8A020] text-[#442b00] px-4 py-1 font-headline font-bold text-[10px] uppercase tracking-tighter">Pick winner</span>
</div>
<!-- Card -->
<div class="relative aspect-[2/3] w-full overflow-hidden border-2 border-[#E8A020] shadow-[0_0_30px_rgba(232,160,32,0.15)] bg-surface-container-low">
<img alt="Cinematic still" class="w-full h-full object-cover brightness-110" data-alt="dramatic close-up of a lone figure in a neon-lit rain-slicked alleyway, moody atmosphere, blue and orange color grading, highly cinematic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhIJS9bRAvRXVsUNk8H5xUQZ1ILgngjYoyzsA3aeLn_PdmiUIy-sMaXcrTEZimlyqoXLxiGZEmtmIsxlvIgTtK83e55nKinQtx1x-E4MqQraFIbF7xoirc-s33C2ZUbQC_HXdtb-jXNzI-yy59scLlCNophBqCZzHNDfhPRkCXxELttukIx21LDRsf5HzntvS9lpUzqfTFeRvYDu9VsFOhio7S8_TcxC98RBS3M3M1ljnDWHpYST1G_iIpgoD77d5b6C1kCMkJeaE"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#0F0E0D] via-transparent to-transparent opacity-80"></div>
<div class="absolute bottom-0 left-0 p-6 w-full">
<span class="font-label text-[10px] font-bold uppercase tracking-[0.15em] text-[#E8A020]">1994 • THRILLER</span>
<h3 class="font-headline text-3xl font-bold text-[#F5F0E8] mt-1 leading-none uppercase tracking-tighter">Leon: The Professional</h3>
</div>
</div>
</div>
<!-- VS Badge (Pulsing) -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-30 md:block hidden">
<div class="w-16 h-16 bg-secondary-container rounded-none flex items-center justify-center border border-[#ffb59d]/30 animate-pulse">
<span class="font-headline font-black text-2xl text-on-secondary-container tracking-tighter">VS</span>
</div>
</div>
<!-- Mobile VS -->
<div class="md:hidden flex justify-center py-4">
<div class="px-6 py-2 bg-secondary-container border border-[#ffb59d]/20">
<span class="font-headline font-black text-xl text-on-secondary-container tracking-tighter italic">VS</span>
</div>
</div>
<!-- Competitor B -->
<div class="relative group cursor-pointer transition-all duration-300 transform hover:scale-[1.02] active:scale-95">
<!-- Floating Label -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 z-20">
<span class="bg-[#E8A020] text-[#442b00] px-4 py-1 font-headline font-bold text-[10px] uppercase tracking-tighter">Pick winner</span>
</div>
<!-- Card -->
<div class="relative aspect-[2/3] w-full overflow-hidden border-2 border-[#E8A020] shadow-[0_0_30px_rgba(232,160,32,0.15)] bg-surface-container-low">
<img alt="Cinematic still" class="w-full h-full object-cover brightness-110" data-alt="wide cinematic shot of a futuristic desert landscape with massive brutalist structures, golden hour lighting, deep shadows and warm highlights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCitxZEW1pf4xutNOiHEaCUgibrvRTYsUswOysF_yx9iRf5edwUP0-ky2QnwfjiM7sqxPbpth0DOkwQP8lFmc4wb4sPl7INYuyYcaLnJv1Ny_IpVnea5tGSG9yIv4v99duHaea89AdYQT-2Xtkhxn5I1Tsz1MTkrNhE3lLkoi4zjxmfmwJs9M869AF1M1g5soaL6AeP6IdG_Oj82DFNV601aITjpMxa4eYe6g0slQUv9fN8-cNWsK1zklOh2WNRdX4h0nSFAXGmPDI"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#0F0E0D] via-transparent to-transparent opacity-80"></div>
<div class="absolute bottom-0 left-0 p-6 w-full">
<span class="font-label text-[10px] font-bold uppercase tracking-[0.15em] text-[#E8A020]">2017 • SCI-FI</span>
<h3 class="font-headline text-3xl font-bold text-[#F5F0E8] mt-1 leading-none uppercase tracking-tighter">Blade Runner 2049</h3>
</div>
</div>
</div>
</div>
<!-- Secondary Action -->
<div class="mt-12">
<button class="border border-outline-variant/30 text-on-surface-variant font-headline font-bold text-xs uppercase tracking-widest px-8 py-3 hover:bg-surface-container-high transition-colors">
                Draw / Skip Round
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe bg-[#0F0E0D]/70 dark:bg-[#0F0E0D]/70 backdrop-blur-xl md:hidden shadow-[0_-8px_32px_rgba(232,160,32,0.08)]">
<div class="flex flex-col items-center justify-center text-[#E8A020] bg-[#E8A020]/10 rounded-none px-6 py-2 border-t-2 border-[#E8A020] transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="swords" style="font-variation-settings: 'FILL' 1;">swords</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] font-headline">Duel</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B6760] px-6 py-2 hover:text-[#F5F0E8] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] font-headline">Rankings</span>
</div>
</nav>
<!-- Ambient Texture Layer -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[60] bg-[url('https://www.transparenttextures.com/patterns/film-grain.png')]"></div>
</body></html>
